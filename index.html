<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Sewa Moben</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #f4f4f4; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }

        /* Daftar jenis foto - tampilan memanjang (vertikal), bukan dropdown */
        .photo-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn-photo {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; background: #f8f9fa; color: #333; border: 2px solid #ddd;
            border-radius: 8px; cursor: pointer; width: 100%; font-size: 15px; font-weight: bold;
            text-align: left; margin-bottom: 0;
        }
        .btn-photo.active-type { border-color: #007bff; background: #eaf3ff; }

        .camera-container { position: relative; width: 100%; max-width: 400px; margin: 15px auto; overflow: hidden; border-radius: 8px; background: #000; }
        video { width: 100%; height: auto; display: block; }

        /* Overlay bingkai foto - kotak "jendela" ditengah, area luar digelapkan */
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 3px solid #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
            box-sizing: border-box; pointer-events: none; transition: 0.2s;
        }
        /* KTP asli berbentuk landscape (lebih lebar dari tinggi), rasio kartu identitas ~1.586:1 */
        .overlay.ktp-mode { width: 82%; aspect-ratio: 1.586 / 1; border-radius: 10px; }
        /* Selfie + KTP: bingkai potrait agar wajah & kartu KTP di dada terlihat */
        .overlay.selfie-mode { width: 68%; aspect-ratio: 3 / 4; border-radius: 16px; }
        /* Rumah / kaleng nomor rumah: bingkai lebar biasa */
        .overlay.wide-mode { width: 92%; aspect-ratio: 4 / 3; border-radius: 6px; }

        button { padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        button.btn-secondary { background: #007bff; }
        button.btn-warning { background: #ffc107; color: black; }
        canvas { display: none; }
        .status-badge { display: inline-block; padding: 4px 8px; background: #ddd; font-size: 12px; border-radius: 3px; font-weight: bold; }
        .status-badge.ready { background: #28a745; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: #28a745;">Pendaftaran Moben</h2>

    <div id="step1" class="step active">
        <div class="form-group"><label>Nama Lengkap:</label><input type="text" id="nama"></div>
        <div class="form-group"><label>Akun Sosmed (IG/FB):</label><input type="text" id="sosmed"></div>
        <div class="form-group"><label>Kontak Darurat:</label><input type="text" id="kontakDarurat"></div>
        <div class="form-group"><label>Wilayah:</label>
            <select id="region">
                <option value="Kota Bekasi">Kota Bekasi</option>
                <option value="Kabupaten Bekasi">Kabupaten Bekasi</option>
            </select>
        </div>
        <button class="btn-secondary" onclick="changeStep(2)">Lanjut ➡️</button>
    </div>

    <div id="step2" class="step">
        <div class="form-group">
            <label>Lokasi GPS Rumah Asli:</label>
            <button class="btn-warning" onclick="getLocation()">📌 Kunci GPS</button>
            <input type="text" id="lokasi" readonly style="background: #e9ecef;">
            <input type="hidden" id="gpsAccuracy"><input type="hidden" id="userIp">
        </div>
        <button class="btn-secondary" onclick="changeStep(3)">Lanjut ke Kamera ➡️</button>
    </div>

    <div id="step3" class="step">
        <div class="form-group">
            <label>Pilih & Ambil Foto (urutkan dari atas ke bawah):</label>
            <div class="photo-list">
                <button type="button" class="btn-photo" id="type-ktp" onclick="openCamera('ktp')">
                    <span>1. Foto KTP</span><span id="badge-ktp" class="status-badge">Belum</span>
                </button>
                <button type="button" class="btn-photo" id="type-selfie" onclick="openCamera('selfie')">
                    <span>2. Selfie + KTP</span><span id="badge-selfie" class="status-badge">Belum</span>
                </button>
                <button type="button" class="btn-photo" id="type-rumah" onclick="openCamera('rumah')">
                    <span>3. Foto Rumah Jarak 2M</span><span id="badge-rumah" class="status-badge">Belum</span>
                </button>
                <button type="button" class="btn-photo" id="type-kaleng" onclick="openCamera('kaleng')">
                    <span>4. Foto Kaleng No Rumah</span><span id="badge-kaleng" class="status-badge">Belum</span>
                </button>
            </div>
        </div>

        <div class="camera-container" id="cameraContainer" style="display:none;">
            <video id="video" autoplay playsinline muted></video>
            <div id="cameraOverlay" class="overlay"></div>
        </div>
        <canvas id="canvas"></canvas>
        <button id="btnCapture" onclick="capturePhotoTemporarily()" style="display:none;">📸 Ambil Foto</button>

        <button id="btnSubmitAll" onclick="submitFormKolektif()">KIRIM PENDAFTARAN</button>
        <div id="statusMessage" style="text-align:center; font-weight:bold;"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzJCp-Vf4B4LmkqGVC6M6sQrxceXTkHRmgSqgjbNhheIBdICaRuY07LZkIG2uhDC6yW/exec";
    let tempFiles = { ktp: null, selfie: null, rumah: null, kaleng: null };
    let currentDocType = null;
    let currentStream = null;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('cameraOverlay');
    const btnCapture = document.getElementById('btnCapture');
    const cameraContainer = document.getElementById('cameraContainer');

    window.onload = () => fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('userIp').value = d.ip).catch(e=>console.log(e));

    function changeStep(n) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById('step' + n).classList.add('active'); }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                p => { document.getElementById('gpsAccuracy').value = p.coords.accuracy; document.getElementById('lokasi').value = `https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`; alert("GPS Terkunci!"); },
                e => alert("Gagal GPS. Aktifkan lokasi."), { enableHighAccuracy: true }
            );
        }
    }

    // Frame bingkai per jenis foto
    function overlayClassFor(type) {
        if (type === 'ktp') return 'ktp-mode';
        if (type === 'selfie') return 'selfie-mode';
        return 'wide-mode'; // rumah & kaleng
    }

    // Kamera depan hanya untuk selfie, sisanya kamera belakang
    function facingModeFor(type) {
        return type === 'selfie' ? 'user' : 'environment';
    }

    async function openCamera(type) {
        currentDocType = type;

        // tandai tombol jenis foto yang sedang aktif
        document.querySelectorAll('.btn-photo').forEach(b => b.classList.remove('active-type'));
        document.getElementById('type-' + type).classList.add('active-type');

        // set bingkai sesuai jenis foto
        overlay.className = 'overlay ' + overlayClassFor(type);

        // hentikan stream kamera sebelumnya (kalau ada) sebelum ganti kamera depan/belakang
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = null;
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingModeFor(type) },
                audio: false
            });
            video.srcObject = currentStream;
            cameraContainer.style.display = 'block';
            btnCapture.style.display = 'block';
        } catch (err) {
            alert("Akses kamera ditolak atau tidak tersedia.");
        }
    }

    function capturePhotoTemporarily() {
        if (!currentDocType) return;
        const t = currentDocType;
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        tempFiles[t] = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('badge-' + t).innerHTML = "✓ Siap";
        document.getElementById('badge-' + t).className = "status-badge ready";
    }

    function submitFormKolektif() {
        const p = {
            nama: document.getElementById('nama').value, region: document.getElementById('region').value,
            lokasi: document.getElementById('lokasi').value, sosmed: document.getElementById('sosmed').value,
            kontakDarurat: document.getElementById('kontakDarurat').value, gpsAccuracy: document.getElementById('gpsAccuracy').value,
            userIp: document.getElementById('userIp').value, files: tempFiles
        };
        if (!p.nama || !p.lokasi.includes("http") || !tempFiles.ktp || !tempFiles.selfie) return alert("Lengkapi data dan foto utama!");

        document.getElementById('statusMessage').innerText = "Mengirim...";
        document.getElementById('btnSubmitAll').disabled = true;
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(p) })
        .then(r => r.json()).then(res => {
            document.getElementById('statusMessage').innerText = res.message;
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        }).catch(e => document.getElementById('statusMessage').innerText = "Gagal Jaringan.");
    }
</script>
</body>
</html>
